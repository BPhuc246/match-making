# app/server/src/test/resources/application.properties
# Dummy values for running tests in CI — NOT real secrets

spring.application.name=matchmaking

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

server.port=8080
server.servlet.context-path=/

jwt.refreshKey=test-refresh-secret-key-for-ci-do-not-use-in-prod
jwt.accessKey=test-access-secret-key-for-ci-do-not-use-in-prod
jwt.durationRefresh=604800
jwt.durationAccess=3600
jwt.chronoRefresh=SECONDS
jwt.chronoAccess=SECONDS
jwt.cookieRefresh=604800
jwt.cookieAccess=3600

frontend.url=http://localhost:5173

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect