# app/server/src/test/resources/application.properties
# Dummy values for running tests in CI — NOT real secrets

jwt.refreshKey=test-refresh-secret-key-for-ci-do-not-use-in-prod
jwt.accessKey=test-access-secret-key-for-ci-do-not-use-in-prod
jwt.durationRefresh=604800
jwt.durationAccess=3600
jwt.chronoRefresh=SECONDS
jwt.chronoAccess=SECONDS

# In-memory DB so no real database is needed in CI
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect